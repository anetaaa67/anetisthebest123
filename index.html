<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panda Červená Veštírna</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <div class="hero-image">
      <img src="Copilot_20260622_112742.png" alt="Hero" class="hero-emoji" id="heroEmoji" />
    </div>

    <h1>Panda Červená Veštírna</h1>
    <p class="description">Stiskni tlačítko a zjisti, co čeká člověka v budoucnosti — panda inspirovaná věštba s cool atmosférou.</p>

    <div class="button-row">
      <button id="revealButton">Vyvěštění</button>
      <button id="tarotButton">Tarot dne</button>
    </div>

    <div class="results-grid">
      <section class="result-card" id="futureCard" aria-live="polite">
        <div class="poop-cluster" aria-hidden="true">
          <span class="poop">💩</span>
          <span class="poop">💩</span>
          <span class="poop">💩</span>
        </div>
        <div class="koala-wrap">
          <div class="koala-face" aria-hidden="true">🐨</div>
        </div>
        <p id="futureText">Tady se objeví budoucnost člověka.</p>
      </section>

      <section class="result-card tarot-card" id="tarotCard" aria-live="polite">
        <div class="poop-cluster" aria-hidden="true">
          <span class="poop">💩</span>
          <span class="poop">💩</span>
          <span class="poop">💩</span>
        </div>
        <div class="tarot-image-wrap">
          <div id="tarotEmoji" class="tarot-emoji" aria-hidden="true">🔮</div>
        </div>
        <p class="tarot-label" id="tarotText">Tarot karta dne se zobrazí po kliknutí.</p>
      </section>
    </div>

    <div class="question-input-wrap">
      <input type="text" id="questionInput" class="question-input" placeholder="Ptej se na svou budoucnost..." />
      <button id="generateAnswerButton" class="generate-answer-button">Generovat odpověď</button>
      <p id="answerText" class="answer-text"></p>

      <div class="zodiac-wrap">
        <input type="text" id="zodiacInput" class="zodiac-input" placeholder="Napiš své znamení..." />
        <button id="showZodiacButton" class="show-zodiac-button">Zobraz popis znamení</button>
        <p id="zodiacDescription" class="zodiac-description"></p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
