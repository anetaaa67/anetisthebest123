<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koali Veštírna</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=900&q=80" alt="Roztomilá koala sedící na stromě" />
    </div>

    <h1>Koali Veštírna</h1>
    <p class="description">Stiskni tlačítko a zjisti, co čeká člověka v budoucnosti — koali inspirovaná věštba s cool atmosférou.</p>

    <div class="button-row">
      <button id="revealButton">Vyvěštění</button>
      <button id="tarotButton">Tarot dne</button>
    </div>

    <div class="results-grid">
      <section class="result-card" id="futureCard" aria-live="polite">
        <div class="poop-cluster" aria-hidden="true">
          <span class="poop">💩</span>
          <span class="poop">💩</span>
          <span class="poop">💩</span>
        </div>
        <div class="koala-face" aria-hidden="true">🐨</div>
        <p id="futureText">Tady se objeví budoucnost člověka.</p>
      </section>

      <section class="result-card tarot-card" id="tarotCard" aria-live="polite">
        <div class="tarot-image-wrap">
          <img id="tarotImage" src="https://images.unsplash.com/photo-1515847049296-a281d6401047?auto=format&fit=crop&w=500&q=80" alt="Tarot karta s koalou" />
        </div>
        <p class="tarot-label" id="tarotText">Tarot karta dne se zobrazí po kliknutí.</p>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
